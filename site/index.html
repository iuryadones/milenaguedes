<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milena Guedes — Massoterapia Integrativa</title>
  <meta name="description" content="Seu refúgio de relaxamento e renovação. Massoterapia Integrativa e experiências sensoriais." />
  <meta property="og:title" content="Milena Guedes — Massoterapia Integrativa" />
  <meta property="og:description" content="Seu refúgio de relaxamento e renovação. Massoterapia Integrativa e experiências sensoriais." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💆‍♀️</text></svg>" />
  <link data-trunk rel="css" href="css/styles.css" />
  <link data-trunk rel="copy-dir" href="assets" />
  <style>
    #app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F8F4ED;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #app-loading .spinner {
      width: 48px; height: 48px;
      border: 4px solid #F0EADE;
      border-top-color: #C4A33D;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    window.addEventListener('load', function() {
      var el = document.getElementById('app-loading');
      if (el) { el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 500); }
    });
  </script>
</head>
<body>
  <div id="app-loading"><div class="spinner"></div></div>
  <div id="app"></div>
</body>
</html>
